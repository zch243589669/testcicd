name: Build and Push Vue App to ACR

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  NAMESPACE: openclawtest      # ✅ ACR 命名空间
  IMAGE_NAME: test-cicd-vue

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
          echo "image_base=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image_base }}:${{ steps.meta.outputs.sha_short }}
            ${{ steps.meta.outputs.image_base }}:${{ steps.meta.outputs.build_date }}
            ${{ steps.meta.outputs.image_base }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output results
        run: |
          echo "✅ Build completed!"
          echo ""
          echo "📦 Image Tags:"
          echo "  • ${{ steps.meta.outputs.image_base }}:${{ steps.meta.outputs.sha_short }}"
          echo "  • ${{ steps.meta.outputs.image_base }}:${{ steps.meta.outputs.build_date }}"
          echo "  • ${{ steps.meta.outputs.image_base }}:latest"
